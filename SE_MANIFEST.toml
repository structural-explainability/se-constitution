# ============================================================
# SE_MANIFEST.toml (Repository Declaration)
# ============================================================

schema = "se-manifest-schema"
schema_url = "https://raw.githubusercontent.com/structural-explainability/se-manifest-schema/main/manifest-schema.toml"

# === Framework Context ===

[meta]
framework = "Structural Explainability"
framework_url = "https://github.com/structural-explainability"
purpose = "Declares this repository's role in the Structural Explainability ecosystem."

# === Repository Identity ===

[repo]
name = "se-constitution"
org = "structural-explainability"
class = "constitution"
kind = "foundation"
status = "active"
since = "2026"
summary = "Canonical specification and validation framework for Structural Explainability."

# === Layer Position ===

[layer]
space = "operational-foundation"
role = "constitution"

# === Dependency Declarations ===

[depends]
# Required upstream repository dependencies.
# WHY: Constitution now consumes the formal contract, not the theory repos.
required = [
  "se-formal-contract",
]

# Optional upstream repository dependencies.
optional = []

# === Formal Contract Declaration ===

[contract]
# Version of the formal contract this constitution consumes.
contract_version = "0.2.0"

# This repository consumes, but does not export, the verified contract.
exports_verified_contract = false

# Upstream formal contract authority.
consumes_contract_from = "se-formal-contract"

# === Provided Artifacts ===

[provides]
# WHY: Explicit artifact ownership.
artifacts = [
  "class-registry",
  "dependency-rules",
  "naming-patterns",
  "manifest-schema",
  "repo-requirements",
  "validation",
]

# === Scope ===

[scope]
# WHY: Keep this tight and structural.
includes = [
  "definition of repository classes",
  "definition of allowed dependency relationships",
  "definition of naming constraints",
  "definition of manifest structure",
  "cross-artifact validation rules",
  "validation against the consumed formal contract",
]

excludes = [
  "Lean theorem development",
  "formal proof export generation",
  "domain-specific implementations",
  "runtime systems",
  "data processing logic",
  "epistemic or causal interpretation",
]

# === Citation ===

[citation]
cff = "CITATION.cff"
preferred = "CITATION.cff"

# === Traceability ===

[traceability]
# WHY: Reserved for future identifier resolution.
identifier_map = "none"
