# ============================================================
# SE Constitution: Repo Requirements Registry
# Defines required artifacts, required docs, and baseline
# obligations by repository class.
# ============================================================

[meta]
schema = "se-constitution-repo-requirements-1"
version = "0.1.0"
status = "draft"
title = "SE Repo Requirements Registry"
purpose = "Defines required repository artifacts and obligations by SE repository class."

[global]
required_root_files = [
  "README.md",
  "SE_MANIFEST.toml"
]

recommended_root_files = [
  "LICENSE",
  "CITATION.cff"
]

required_root_directories = [
  "docs"
]

cross_platform_required = true
utf8_required = true
ascii_repo_name_required = true

# ------------------------------------------------------------
# Common documentation requirements
# ------------------------------------------------------------

[common.docs]
required = [
  "docs/law",
  "docs/class",
  "docs/manifest"
]

recommended = [
  "docs/examples",
  "docs/glossary"
]

notes = "These are ecosystem-oriented defaults. Class-specific requirements below may add to or narrow them."

[common.manifest]
required = true
filename = "SE_MANIFEST.toml"
schema = "se-manifest-2"

[common.automation]
require_ci = true
require_manifest_validation = true

# ------------------------------------------------------------
# Formal Contract
# ------------------------------------------------------------

[repo.formal_contract]
summary = "Lean 4-verified formal contract exporting invariants, regimes, relations, and proof status to operational SE repositories."

required_files = [
  "SE_MANIFEST.toml",
  "README.md",
  "CHANGELOG.md",
  "CITATION.cff",
  "lean-toolchain",
  "lakefile.toml",
]

required_directories = [
  "SEFormalContract",
  "data/contract",
  "docs",
]

# ------------------------------------------------------------
# Theory
# ------------------------------------------------------------

[repo.theory]
summary = "Lean 4 theorem development repositories for Structural Explainability theory."

required_files = [
  "SE_MANIFEST.toml",
  "README.md",
  "CHANGELOG.md",
  "CITATION.cff",
  "lean-toolchain",
  "lakefile.toml",
]

required_directories = [
  "docs",
]


# ------------------------------------------------------------
# Constitution
# ------------------------------------------------------------

[repo.constitution]
summary = "Architectural law and governing definitions for the SE ecosystem."

required_root_files = [
  "README.md",
  "SE_MANIFEST.toml",
  "LICENSE"
]

required_root_directories = [
  "docs",
  "data"
]

required_docs = [
  "docs/law",
  "docs/class",
  "docs/manifest"
]

recommended_docs = [
  "docs/examples",
  "docs/glossary"
]

required_data = [
  "data/class/class-registry.toml",
  "data/naming/naming-patterns.toml",
  "data/dependency/dependency-rules.toml",
  "data/manifest/manifest-schema.toml",
  "data/repo/repo-requirements.toml"
]

required_capabilities = [
  "defines constitutional law",
  "defines repo classes",
  "defines naming law",
  "defines dependency law",
  "defines manifest requirements",
  "defines repo requirements"
]

forbidden_capabilities = [
  "operational orchestration",
  "deployment automation as primary purpose",
  "private implementation code as primary purpose"
]

require_ci = true
require_manifest_validation = true
require_data_validation = true

# ------------------------------------------------------------
# Admin
# ------------------------------------------------------------

[repo.admin]
summary = "Automation, orchestration, and maintenance tooling for the SE ecosystem."

required_root_files = [
