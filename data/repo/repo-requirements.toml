  "LICENSE"
]

required_root_directories = [
  "docs",
  "tools",
  ".github"
]

required_docs = [
  "docs/repo",
  "docs/manifest"
]

recommended_docs = [
  "docs/examples"
]

required_capabilities = [
  "validates manifests",
  "validates naming compliance",
  "validates dependency compliance",
  "provides reusable workflows",
  "provides scaffold tooling"
]

forbidden_capabilities = [
  "redefining constitutional law",
  "redefining repo classes"
]

require_ci = true
require_manifest_validation = true
require_data_validation = false

