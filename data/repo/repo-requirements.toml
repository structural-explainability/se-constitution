# ------------------------------------------------------------
# Validation
# ------------------------------------------------------------

[validation]
enforce_known_repo_classes = true
enforce_required_root_files = true
enforce_required_root_directories = true
enforce_required_docs = true
enforce_required_capabilities_declared = false
enforce_forbidden_capabilities = false

[notes]
capability_fields_note = "Required and forbidden capabilities are constitutional guidance now and may later become machine-validated."
