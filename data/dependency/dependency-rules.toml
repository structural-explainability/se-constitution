# ============================================================
# SE Constitution: Dependency Rules
# Defines allowed dependency directions between repository classes.
#
# Sections MUST remain in semantic (architectural) order.
# Lists MUST be sorted in alphabetical order for stability and diff clarity.
# ============================================================

[meta]
version = "0.1.0"
status = "draft"
title = "SE Constitution Dependency Rules"

[principle]
formal_contract_is_root = true
no_cycles = true
no_reverse_foundation_dependencies = true
constitution_is_foundational = true

[dependency.formal_contract]
allowed = []

[dependency.theory]
allowed = [
    "formal_contract",
]

[dependency.constitution]
allowed = [
    "formal_contract",
]

[dependency.admin]
allowed = [
    "adapter",
    "constitution",
    "docs",
    "govsrc",
    "kernel",
    "mapping",
    "mapspec",
    "policy",
    "profile",
    "regimes",
    "rules",
    "schema",
]

[dependency.policy]
allowed = ["constitution"]

[dependency.kernel]
allowed = ["constitution"]

[dependency.schema]
allowed = ["constitution", "kernel"]

[dependency.mapspec]
allowed = ["constitution", "kernel", "schema"]

[dependency.mapping]
allowed = ["constitution", "kernel", "schema", "mapspec"]

[dependency.adapter]
allowed = ["constitution", "kernel", "schema", "mapping"]

[dependency.profile]
allowed = ["constitution", "kernel", "schema"]

[dependency.regimes]
allowed = ["constitution", "kernel", "mapspec"]

[dependency.govsrc]
allowed = ["constitution", "mapspec"]

[dependency.rules]
allowed = ["constitution", "kernel", "schema", "profile"]

[dependency.pilot]
allowed = [
    "adapter",
    "constitution",
    "docs",
    "kernel",
    "mapping",
    "mapspec",
    "profile",
    "rules",
    "schema",
]

[dependency.docs]
allowed = [
    "adapter",
    "constitution",
    "govsrc",
    "kernel",
    "mapping",
    "mapspec",
    "policy",
    "profile",
    "regimes",
    "rules",
    "schema",
]

[validation]
all_dependencies_must_be_declared_in_manifest = true
dependency_classes_must_be_known = true
forbid_unknown_dependency_classes = true
